<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rugby Spirit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <div class="container">

    <div class="banner-card">
      <div class="banner-content">
        <h1>Be part of our rugby family</h1>
        <h2>Team spirit, self-improvement and respect.</h2>

        <a class="btn-blue" id="joinBtn" onclick="showEmailForm(event)">Join us</a>

        <div class="email-form" id="emailForm">
          <p class="email-label">Enter your email address to join the team !</p>
          <div class="email-row">
            <input type="email" id="emailInput" class="email-input" placeholder="your@email.com">
            <button class="btn-send" onclick="sendEmail()">Send</button>
          </div>
          <p class="email-confirm" id="emailConfirm"></p>
        </div>

      </div>
    </div>

    <div id="discover">
      <h2 class="section-title">Discover rugby</h2>

      <div class="cards">

        <div class="card-white text-center">
          <h3>Training</h3>
          <img src="images/entrainements.png" alt="Training">
          <p>You train as a team</p>
        </div>

        <div class="card-white text-center">
          <h3>Values</h3>
          <img src="images/valeurs.jpeg" alt="Values">
          <div class="values-list">
            <span>Team-spirit</span>
            <span>Respect</span>
            <span>Strength</span>
          </div>
        </div>

        <div class="card-white text-center">
          <h3>Competition</h3>
          <img src="images/trophée.jpeg" alt="Competition">
          <p>Major rugby trophies :</p>
          <ul>
            <li><a href="https://top14.lnr.fr/" target="_blank">Top 14</a></li>
            <li><a href="https://www.epcrugby.com/fr/champions-cup/matchs" target="_blank">Champions Cup</a></li>
            <li><a href="https://www.rugbyworldcup.com/2027/fr" target="_blank">World Cup</a></li>
          </ul>
        </div>

      </div>
    </div>

  </div>

  <script>
    function showEmailForm(e) {
      e.preventDefault();
      var btn = document.getElementById('joinBtn');
      var form = document.getElementById('emailForm');

      btn.style.display = 'none';

      form.style.display = 'flex';

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          form.classList.add('visible');
          document.getElementById('emailInput').focus();
        });
      });
    }

    function sendEmail() {
      var input = document.getElementById('emailInput');
      var confirm = document.getElementById('emailConfirm');
      var email = input.value.trim();

      if (!email || !email.includes('@')) {
        input.style.borderColor = '#f87171';
        input.placeholder = 'Entrez un email valide';
        return;
      }

      input.style.borderColor = '#4ade80';
      confirm.textContent = "✓ Welcome in the team ! Excited to see you";
      confirm.style.color = '#4ade80';
      input.disabled = true;
      document.querySelector('.btn-send').disabled = true;
    }
  </script>

</body>
</html>
